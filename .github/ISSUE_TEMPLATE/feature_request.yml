name: Feature Request
description: Suggest an idea or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! All ideas are welcome — from small tweaks to entirely new workflows.

  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: A clear description of the problem, if applicable.
      placeholder: "e.g. I'm always frustrated when..."

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: What area does this relate to?
      options:
        - Setup script (.bat / .ps1)
        - Power Platform Master Agent
        - PAC CLI helper script
        - Workspace structure / folder layout
        - Skills integration
        - Documentation
        - Cross-platform support
        - Other
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: How would it work?
      description: |
        If you have thoughts on implementation, describe them here. This could be changes to the setup script, new agent workflows, new files, or integration with other tools.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any alternative solutions or workarounds you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references that help explain the request.
