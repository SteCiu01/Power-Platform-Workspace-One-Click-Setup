name: Bug Report
description: Report something that isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Double-click Setup-PowerPlatformWorkspace.bat
        2. Enter folder name "My Workspace"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / terminal output
      description: If applicable, paste any error messages or screenshots here.
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: ps-version
    attributes:
      label: PowerShell version
      description: "Run: $PSVersionTable.PSVersion"
      placeholder: "e.g. 5.1.22621.4391"

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      description: "Run: code --version"
      placeholder: "e.g. 1.99.0"

  - type: input
    id: pac-version
    attributes:
      label: PAC CLI version
      description: "Run: pac --version (or 'not installed')"
      placeholder: "e.g. 1.35.4 or not installed"

  - type: input
    id: git-version
    attributes:
      label: Git version
      description: "Run: git --version"
      placeholder: "e.g. 2.44.0"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help diagnose the issue.
